<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chess Puzzles</title>
    <link rel="stylesheet" href="vendor/cm-chessboard/assets/chessboard.css" />
    <link rel="stylesheet" href="vendor/cm-chessboard/assets/extensions/markers/markers.css" />
    <link rel="stylesheet" href="src/ui/styles.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7a4a2b" />
    <script type="importmap">
      {
        "imports": {
          "chess.js": "./vendor/chess.js/dist/esm/chess.js",
          "cm-chessboard": "./vendor/cm-chessboard/src/Chessboard.js",
          "cm-chessboard/": "./vendor/cm-chessboard/",
          "idb": "./vendor/idb/build/index.js"
        }
      }
    </script>
  </head>
  <body>
    <button id="install-btn" type="button" class="install-btn" hidden>Install app</button>
    <button id="gear-btn" type="button" class="gear-btn" aria-label="Settings">⚙</button>
    <canvas id="confetti-canvas" class="confetti-canvas" aria-hidden="true"></canvas>
    <div id="settings-scrim" class="settings-scrim" aria-hidden="true"></div>
    <div id="settings-sheet" class="settings-sheet" role="dialog" aria-label="Settings">
      <div class="settings-sheet-header">
        <h2>Settings</h2>
        <button id="settings-close" type="button" class="settings-close" aria-label="Close">×</button>
      </div>
      <!-- Phase 6.1: profile section -->
      <div class="setting-row profile-row">
        <button id="profile-active" type="button" class="profile-active" aria-label="Switch profile">
          <span id="profile-active-avatar" class="profile-avatar"></span>
          <span id="profile-active-name" class="profile-active-name"></span>
          <span class="profile-active-chevron">›</span>
        </button>
        <button id="profile-rename" type="button" class="profile-rename" aria-label="Rename profile">✏</button>
      </div>
      <div id="profile-switcher" class="profile-switcher" hidden>
        <div id="profile-list" class="profile-list"></div>
        <button id="profile-add" type="button" class="profile-add">+ Add profile</button>
      </div>
      <div class="setting-row">
        <span>Sound</span>
        <label class="toggle">
          <input id="setting-sound" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <span>Theme</span>
        <div class="segmented">
          <button id="setting-theme-warm" type="button">Warm</button>
          <button id="setting-theme-cool" type="button">Cool</button>
        </div>
      </div>
      <div class="setting-row">
        <span>Coordinates</span>
        <label class="toggle">
          <input id="setting-coords" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-section-title">Learning aids</div>
      <div class="setting-row">
        <span>Show legal moves</span>
        <label class="toggle">
          <input id="setting-aid-legal" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <span>Show king's escape squares</span>
        <label class="toggle">
          <input id="setting-aid-king" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <button id="setting-reset-stats" type="button" class="reset-btn">Reset stats</button>
      </div>
    </div>
    <main>
      <div id="stats-header" class="stats-header"></div>
      <div id="theme-chips" class="theme-chips"></div>
      <div id="board" class="board-stage"></div>
      <div id="difficulty-stars" class="difficulty-stars"></div>
      <p id="status" class="status" aria-live="polite">Loading...</p>
      <progress id="loading-progress" class="loading-progress" max="100" value="0" hidden></progress>
      <div class="actions">
        <button id="hint" type="button" aria-label="Hint">Hint</button>
        <button id="show" type="button" aria-label="Show solution">Show</button>
        <button id="skip" type="button" aria-label="Skip puzzle">Skip</button>
      </div>
    </main>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
